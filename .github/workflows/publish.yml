name: Publish Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix)'
        required: true
        type: string
      skip_cocoapods:
        description: 'Skip CocoaPods push'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    name: "📦 Publish Release"
    runs-on: macos-latest
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
      
      - name: Download xcframework from private repo release
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          gh release download "v${{ inputs.version }}" \
            --repo mixpanel/mixpanel-ios-session-replay \
            --pattern "MixpanelSessionReplay.xcframework.zip"
      
      - name: Update xcframework and podspec
        run: |
          rm -rf MixpanelSessionReplay.xcframework
          unzip MixpanelSessionReplay.xcframework.zip
          sed -i '' "s/s.version[[:space:]]*=.*/s.version          = '${{ inputs.version }}'/" MixpanelSessionReplay.podspec
      
      - name: Commit and push to test branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b test-release/${{ inputs.version }}
          git add -A
          git commit -m "Update to version ${{ inputs.version }}"
          git push origin test-release/${{ inputs.version }}
      
